<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Haunted Gilded Mirror - Vibe Coding</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #65067b; /* 統一魔幻紫大背景 */
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 預留 93vh 安全邊距，防止上下雕花被手機路徑列裁切 */
        #mirror-wrapper {
            position: relative;
            height: 93vh;
            aspect-ratio: 1 / 2;
            background-color: #65067b;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        /* 頂層金框 */
        #mirror-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; 
            z-index: 10;
        }

        /* WebGL 畫布：精準與金框内軌完美咬合 */
        #webgl-canvas {
            position: absolute;
            top: 11.0%;
            left: 10.5%;
            width: 79.0%;
            height: 41.0%;
            border-radius: 50%;
            z-index: 5;
            background-color: #65067b;
            touch-action: none;
        }

        /* 互動初始遮罩 */
        #onboarding-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #65067b;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #65067b;
            background-color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        #status-tip {
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="onboarding-overlay">
        <button id="start-btn">Face the Mirror</button>
        <div id="status-tip">點擊以喚醒魔鏡並同步授權相機與陀螺儀</div>
    </div>
    
    <div id="mirror-wrapper">
        <img id="mirror-image" src="mirror.png" alt="Gilded Mirror Frame">
        <canvas id="webgl-canvas"></canvas>
    </div>

    <script>
        const overlay = document.getElementById('onboarding-overlay');
        const startBtn = document.getElementById('start-btn');
        const statusTip = document.getElementById('status-tip');
        const canvas = document.getElementById('webgl-canvas');
        
        // 1. 初始化 Three.js Scene
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            renderer.setSize(rect.width, rect.height, false);
            if (material) {
                material.uniforms.uCanvasAspect.value = rect.width / rect.height;
            }
        }

        // 2. 視訊設定
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;

        let videoAspect = 1.777; 
        video.addEventListener('loadedmetadata', () => {
            videoAspect = video.videoWidth / video.videoHeight;
            if (material) material.uniforms.uVideoAspect.value = videoAspect;
        });

        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        // 3. 滑鼠局部漣漪快取
        const maxRipples = 6;
        const ripples = Array(maxRipples).fill(null).map(() => ({ x: 0, y: 0, age: 0, intensity: 0 }));
        const rippleData = new Float32Array(maxRipples * 4); 
        let rippleIndex = 0;
        let lastX = 0, lastY = 0;

        // 4. 連續流體動態著色器 (更密、更慢、不間斷演算法)
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uVideoTex: { value: videoTexture },
                uRipples: { value: rippleData },
                uCanvasAspect: { value: 1.0 },
                uVideoAspect: { value: 1.777 },
                // 升級：連續流體 Uniforms 矩陣
                uGyroTime: { value: 0.0 },
                uGyroIntensity: { value: 0.0 },
                uGyroCenter: { value: new THREE.Vector2(0.5, 0.5) }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D uVideoTex;
                uniform vec4 uRipples[6]; 
                uniform float uCanvasAspect;
                uniform float uVideoAspect;
                uniform float uGyroTime;
                uniform float uGyroIntensity;
                uniform vec2 uGyroCenter; 
                varying vec2 vUv;

                void main() {
                    vec2 uv = vUv;
                    vec2 displacedUv = uv;
                    float shadowHighlight = 0.0;
                    
                    // 【A. 陀螺儀：高密度、慢速連續流體大水波】
                    if (uGyroIntensity > 0.0) {
                        vec2 uvScaled = uv * vec2(uCanvasAspect, 1.0);
                        vec2 gyroCenterScaled = uGyroCenter * vec2(uCanvasAspect, 1.0);
                        float dist = distance(uvScaled, gyroCenterScaled);
                        
                        // 【核心修正】密度大幅加強（58.0 / 96.0），且時間常數流速變慢，水波深沉而綿密
                        float mainWave = sin(dist * 58.0 - uGyroTime * 1.2);
                        float harmonicWave = cos(dist * 96.0 - uGyroTime * 0.7) * 0.4;
                        float totalWave = mainWave + harmonicWave;
                        
                        // 隨著往外擴散，能量自然呈指數型態柔和衰減，避免死黑
                        float distanceDecay = exp(-dist * 1.8);
                        float waveFinal = totalWave * uGyroIntensity * distanceDecay;
                        
                        vec2 dir = uvScaled - gyroCenterScaled;
                        if (length(dir) > 0.0001) {
                            // 精緻微調拉扯幅度與極淡光影
                            displacedUv += (normalize(dir) / vec2(uCanvasAspect, 1.0)) * waveFinal * 0.009;
                            shadowHighlight += waveFinal * 0.035;
                        }
                    }
                    
                    // 【B. 桌機滑鼠局部微波】
                    for(int i = 0; i < 6; i++) {
                        float age = uRipples[i].z;
                        if (age > 0.0 && age < 1.0) {
                            vec2 center = uRipples[i].xy;
                            vec2 uvScaled = uv * vec2(uCanvasAspect, 1.0);
                            vec2 centerScaled = center * vec2(uCanvasAspect, 1.0);
                            float dist = distance(uvScaled, centerScaled);
                            float maxRadius = age * 0.6;
                            
                            if (dist < maxRadius) {
                                float progress = dist / maxRadius;
                                float wave = sin((dist - maxRadius) * 35.0);
                                float intensity = uRipples[i].w * pow(1.0 - age, 1.5) * smoothstep(0.0, 0.2, progress);
                                
                                vec2 dir = uvScaled - centerScaled;
                                if (length(dir) > 0.0001) {
                                    displacedUv += (normalize(dir) / vec2(uCanvasAspect, 1.0)) * wave * intensity * 0.012;
                                    shadowHighlight += wave * intensity * 0.025;
                                }
                            }
                        }
                    }
                    
                    displacedUv = clamp(displacedUv, 0.002, 0.998);
                    displacedUv.x = 1.0 - displacedUv.x; // 鏡像
                    
                    // 內置不變形 Object-Fit Cover
                    vec2 finalVideoUv = displacedUv;
                    if (uCanvasAspect > uVideoAspect) {
                        float ratio = uVideoAspect / uCanvasAspect;
                        finalVideoUv.y = (finalVideoUv.y - 0.5) * ratio + 0.5;
                    } else {
                        float ratio = uCanvasAspect / uVideoAspect;
                        finalVideoUv.x = (finalVideoUv.x - 0.5) * ratio + 0.5;
                    }
                    
                    vec4 texColor = texture2D(uVideoTex, finalVideoUv);
                    vec3 rgb = texColor.rgb + vec3(shadowHighlight);
                    gl_FragColor = vec4(rgb, 1.0);
                }
            `
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        function triggerMouseRipple(canvasX, canvasY, intensityMod = 1.0) {
            let x = canvasX / canvas.clientWidth;
            let y = 1.0 - (canvasY / canvas.clientHeight);

            const dist = Math.hypot(x - lastX, y - lastY);
            if (dist > 0.02 || intensityMod > 1.1) {
                ripples[rippleIndex] = { x, y, age: 0.01, intensity: intensityMod * 0.6 };
                rippleIndex = (rippleIndex + 1) % maxRipples;
                lastX = x;
                lastY = y;
            }
        }

        // --- 滑鼠監聽 ---
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerMouseRipple(e.clientX - rect.left, e.clientY - rect.top, 1.0);
            }
        });

        window.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerMouseRipple(e.clientX - rect.left, e.clientY - rect.top, 1.5);
            }
        });

        // --- 授權流程 ---
        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            statusTip.innerText = "正在請求相機權限...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
                });
                video.srcObject = stream;
                await video.play();

                statusTip.innerText = "正在激活陀螺儀...";
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') initGyroscope();
                } else {
                    initGyroscope();
                }

                overlay.style.opacity = 0;
                setTimeout(() => overlay.remove(), 500);
                resizeCanvas();

            } catch (err) {
                console.error(err);
                startBtn.style.display = 'block';
                statusTip.innerText = "授權失敗，請確保環境支援並允許鏡頭存取。";
            }
        });

        // --- 陀螺儀動態捕捉（【核心修正】超高靈敏度持續注入 + 流體波動中心滑動） ---
        let lastAccX = 0, lastAccY = 0;
        let targetCenterX = 0.5, targetCenterY = 0.5;

        function initGyroscope() {
            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity;
                if (!acc) return;

                const deltaX = acc.x - lastAccX;
                const deltaY = acc.y - lastAccY;
                const change = Math.abs(deltaX) + Math.abs(deltaY);
                
                lastAccX = acc.x;
                lastAccY = acc.y;

                // 【核心修正】極度靈敏門檻（0.04），手部只要呼吸微動就能持續積累水波能量
                if (change > 0.04) {
                    let currentInt = material.uniforms.uGyroIntensity.value;
                    // 持續累積能量，上限設為 1.4 防止畫面過度拉扯扭曲
                    material.uniforms.uGyroIntensity.value = Math.min(currentInt + change * 0.12, 1.4);
                    
                    // 【核心修正】根據傾斜偏移向量，動態計算波源的核心目標座標
                    targetCenterX = 0.5 - THREE.MathUtils.clamp(deltaX * 0.22, -0.38, 0.38);
                    targetCenterY = 0.5 - THREE.MathUtils.clamp(deltaY * 0.22, -0.38, 0.38);
                }
            });
        }

        // 6. 渲染與物理模擬循環
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            // A. 連續流體時間演進（控制波動前進的震動速度，數值調小 = 變慢）
            material.uniforms.uGyroTime.value += delta * 2.2; 
            
            // 【核心修正】延長生命週期：能量衰減系數調低，水波在靜止後能持續自然飄盪、消逝得極慢
            if (material.uniforms.uGyroIntensity.value > 0.0) {
                material.uniforms.uGyroIntensity.value *= Math.exp(-0.65 * delta); 
                if (material.uniforms.uGyroIntensity.value < 0.001) {
                    material.uniforms.uGyroIntensity.value = 0.0;
                }
            }

            // 【核心修正】流體中心平滑插值（Lerp）：讓波源核心隨著手機動能絲滑移位，不產生瞬移死結
            let curCenter = material.uniforms.uGyroCenter.value;
            curCenter.x = curCenter.x * 0.88 + targetCenterX * 0.12;
            curCenter.y = curCenter.y * 0.88 + targetCenterY * 0.12;
            
            // B. 滑鼠局部漣漪更新
            for(let i = 0; i < maxRipples; i++) {
                if (ripples[i].age > 0) {
                    ripples[i].age += delta * 1.45; 
                    if (ripples[i].age >= 1.0) ripples[i].age = 0; 
                }
                rippleData[i*4 + 0] = ripples[i].x;
                rippleData[i*4 + 1] = ripples[i].y;
                rippleData[i*4 + 2] = ripples[i].age;
                rippleData[i*4 + 3] = ripples[i].intensity;
            }
            
            material.uniforms.uRipples.value = rippleData;
            renderer.render(scene, camera);
        }

        // 阻斷原生瀏覽器手勢
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        window.addEventListener('resize', resizeCanvas);
        animate();
    </script>
</body>
</html>
