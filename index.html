<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Haunted Gilded Mirror - Vibe Coding</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #65067b; /* 統一魔幻紫背景 */
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 【核心修正】高度由 100vh 縮小至 93vh，預留安全邊距，防止上下雕花被裁切 */
        #mirror-wrapper {
            position: relative;
            height: 93vh;
            aspect-ratio: 1 / 2;
            background-color: #65067b;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        /* 頂層金框 */
        #mirror-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; 
            z-index: 10;
        }

        /* WebGL 畫布：精準與金框内軌完美咬合 */
        #webgl-canvas {
            position: absolute;
            top: 11.0%;
            left: 10.5%;
            width: 79.0%;
            height: 41.0%;
            border-radius: 50%;
            z-index: 5;
            background-color: #65067b;
            touch-action: none;
        }

        /* 互動初始遮罩 */
        #onboarding-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #65067b;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #65067b;
            background-color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        #status-tip {
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="onboarding-overlay">
        <button id="start-btn">Face the Mirror</button>
        <div id="status-tip">點擊以喚醒魔鏡並同步授權相機與陀螺儀</div>
    </div>
    
    <div id="mirror-wrapper">
        <img id="mirror-image" src="mirror.png" alt="Gilded Mirror Frame">
        <canvas id="webgl-canvas"></canvas>
    </div>

    <script>
        const overlay = document.getElementById('onboarding-overlay');
        const startBtn = document.getElementById('start-btn');
        const statusTip = document.getElementById('status-tip');
        const canvas = document.getElementById('webgl-canvas');
        
        // 1. 初始化 Three.js Scene
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            renderer.setSize(rect.width, rect.height, false);
            if (material) {
                material.uniforms.uCanvasAspect.value = rect.width / rect.height;
            }
        }

        // 2. 視訊設定
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;

        let videoAspect = 1.777; 
        video.addEventListener('loadedmetadata', () => {
            videoAspect = video.videoWidth / video.videoHeight;
            if (material) material.uniforms.uVideoAspect.value = videoAspect;
        });

        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        // 3. 滑鼠局部漣漪快取
        const maxRipples = 6;
        const ripples = Array(maxRipples).fill(null).map(() => ({ x: 0, y: 0, age: 0, intensity: 0 }));
        const rippleData = new Float32Array(maxRipples * 4); 
        let rippleIndex = 0;
        let lastX = 0, lastY = 0;

        // 4. 流體美學著色器 (動態多中心巨浪演算法)
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uVideoTex: { value: videoTexture },
                uRipples: { value: rippleData },
                uCanvasAspect: { value: 1.0 },
                uVideoAspect: { value: 1.777 },
                uGyroAge: { value: 0.0 },
                uGyroIntensity: { value: 0.0 },
                // 【核心修正】新增大水波的動態出發點中心控管
                uGyroCenter: { value: new THREE.Vector2(0.5, 0.5) }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D uVideoTex;
                uniform vec4 uRipples[6]; 
                uniform float uCanvasAspect;
                uniform float uVideoAspect;
                uniform float uGyroAge;
                uniform float uGyroIntensity;
                uniform vec2 uGyroCenter; // 動態陀螺儀定位中心
                varying vec2 vUv;

                void main() {
                    vec2 uv = vUv;
                    vec2 displacedUv = uv;
                    float shadowHighlight = 0.0;
                    
                    // 【A. 陀螺儀微幅晃動：動態定點全鏡面巨浪】
                    if (uGyroAge > 0.0 && uGyroAge < 1.0) {
                        // 使用即時傳入的動態偏移中心計算距離
                        vec2 uvScaled = uv * vec2(uCanvasAspect, 1.0);
                        vec2 gyroCenterScaled = uGyroCenter * vec2(uCanvasAspect, 1.0);
                        float dist = distance(uvScaled, gyroCenterScaled);
                        
                        // 多層正餘弦疊加，創造出極佳的覆蓋型漣漪與交錯餘波
                        float mainWave = sin(dist * 12.0 - uGyroAge * 24.0);
                        float harmonicWave = cos(dist * 22.0 - uGyroAge * 12.0) * 0.35;
                        float totalWave = mainWave + harmonicWave;
                        
                        // 自然的水體能量指數衰減
                        float decay = pow(1.0 - uGyroAge, 1.6);
                        float waveIntensity = uGyroIntensity * decay;
                        
                        vec2 dir = uvScaled - gyroCenterScaled;
                        if (length(dir) > 0.0001) {
                            // 微幅優雅拉扯（0.018），收斂高反差死黑（0.05），視覺極致絲滑自然
                            displacedUv += (normalize(dir) / vec2(uCanvasAspect, 1.0)) * totalWave * waveIntensity * 0.018;
                            shadowHighlight += totalWave * waveIntensity * 0.05;
                        }
                    }
                    
                    // 【B. 桌機滑鼠局部微波】
                    for(int i = 0; i < 6; i++) {
                        float age = uRipples[i].z;
                        if (age > 0.0 && age < 1.0) {
                            vec2 center = uRipples[i].xy;
                            vec2 uvScaled = uv * vec2(uCanvasAspect, 1.0);
                            vec2 centerScaled = center * vec2(uCanvasAspect, 1.0);
                            float dist = distance(uvScaled, centerScaled);
                            float maxRadius = age * 0.6;
                            
                            if (dist < maxRadius) {
                                float progress = dist / maxRadius;
                                float wave = sin((dist - maxRadius) * 35.0);
                                float intensity = uRipples[i].w * pow(1.0 - age, 1.5) * smoothstep(0.0, 0.2, progress);
                                
                                vec2 dir = uvScaled - centerScaled;
                                if (length(dir) > 0.0001) {
                                    displacedUv += (normalize(dir) / vec2(uCanvasAspect, 1.0)) * wave * intensity * 0.012;
                                    shadowHighlight += wave * intensity * 0.025;
                                }
                            }
                        }
                    }
                    
                    displacedUv = clamp(displacedUv, 0.002, 0.998);
                    displacedUv.x = 1.0 - displacedUv.x; // 鏡像修正
                    
                    // 著色器內置不變形 Object-Fit Cover 演算法
                    vec2 finalVideoUv = displacedUv;
                    if (uCanvasAspect > uVideoAspect) {
                        float ratio = uVideoAspect / uCanvasAspect;
                        finalVideoUv.y = (finalVideoUv.y - 0.5) * ratio + 0.5;
                    } else {
                        float ratio = uCanvasAspect / uVideoAspect;
                        finalVideoUv.x = (finalVideoUv.x - 0.5) * ratio + 0.5;
                    }
                    
                    vec4 texColor = texture2D(uVideoTex, finalVideoUv);
                    vec3 rgb = texColor.rgb + vec3(shadowHighlight);
                    gl_FragColor = vec4(rgb, 1.0);
                }
            `
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        function triggerMouseRipple(canvasX, canvasY, intensityMod = 1.0) {
            let x = canvasX / canvas.clientWidth;
            let y = 1.0 - (canvasY / canvas.clientHeight);

            const dist = Math.hypot(x - lastX, y - lastY);
            if (dist > 0.02 || intensityMod > 1.1) {
                ripples[rippleIndex] = { x, y, age: 0.01, intensity: intensityMod * 0.6 };
                rippleIndex = (rippleIndex + 1) % maxRipples;
                lastX = x;
                lastY = y;
            }
        }

        // --- 滑鼠監聽 ---
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerMouseRipple(e.clientX - rect.left, e.clientY - rect.top, 1.0);
            }
        });

        window.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerMouseRipple(e.clientX - rect.left, e.clientY - rect.top, 1.5);
            }
        });

        // --- 授權流程與非同步綁定 ---
        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            statusTip.innerText = "正在請求相機權限...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
                });
                video.srcObject = stream;
                await video.play();

                statusTip.innerText = "正在激活陀螺儀...";
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') initGyroscope();
                } else {
                    initGyroscope();
                }

                overlay.style.opacity = 0;
                setTimeout(() => overlay.remove(), 500);
                resizeCanvas();

            } catch (err) {
                console.error(err);
                startBtn.style.display = 'block';
                statusTip.innerText = "授權失敗，請確保環境支援並允許鏡頭存取。";
            }
        });

        // --- 陀螺儀動態捕捉（【核心修正】高靈敏、動態偏移起點） ---
        let lastShakeTime = 0;
        let lastAccX = 0, lastAccY = 0;

        function initGyroscope() {
            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity;
                if (!acc) return;

                // 即時位移向量差
                const deltaX = acc.x - lastAccX;
                const deltaY = acc.y - lastAccY;
                const change = Math.abs(deltaX) + Math.abs(deltaY);
                
                lastAccX = acc.x;
                lastAccY = acc.y;

                const now = Date.now();
                
                // 【核心修正】閥值從 6.0 降至 1.1，冷卻縮短至 180ms，微幅移動即刻觸發
                if (change > 1.1 && (now - lastShakeTime > 180)) {
                    
                    // 【核心修正】根據加速度的方向，動態計算波紋在鏡面中的起源座標 (x, y 都限制在合理橢圓區間內)
                    // 當手機往右下偏，加速度方向會反映在 delta 上，我們將其映射到 0.15~0.85 的 UV 空間內
                    let offsetX = THREE.MathUtils.clamp(deltaX * 0.18, -0.35, 0.35);
                    let offsetY = THREE.MathUtils.clamp(deltaY * 0.18, -0.35, 0.35);
                    
                    // 傳遞動態中心給 Shader (由於 WebGL Y軸向上，視訊方向作對應正負號調整)
                    material.uniforms.uGyroCenter.value.set(0.5 - offsetX, 0.5 - offsetY);
                    
                    material.uniforms.uGyroAge.value = 0.01; 
                    material.uniforms.uGyroIntensity.value = 1.2; 
                    lastShakeTime = now;
                }
            });
        }

        // 6. 渲染循環
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            // 更新滑鼠漣漪消逝速度 (【核心修正】加速至 1.45，回復清澈水速)
            for(let i = 0; i < maxRipples; i++) {
                if (ripples[i].age > 0) {
                    ripples[i].age += delta * 1.45; 
                    if (ripples[i].age >= 1.0) ripples[i].age = 0; 
                }
                rippleData[i*4 + 0] = ripples[i].x;
                rippleData[i*4 + 1] = ripples[i].y;
                rippleData[i*4 + 2] = ripples[i].age;
                rippleData[i*4 + 3] = ripples[i].intensity;
            }
            
            // 更新手機搖晃全局巨浪消逝速度 (【核心修正】加速至 1.45，清脆自然)
            if (material.uniforms.uGyroAge.value > 0.0) {
                material.uniforms.uGyroAge.value += delta * 1.45; 
                if (material.uniforms.uGyroAge.value >= 1.0) {
                    material.uniforms.uGyroAge.value = 0.0;
                    material.uniforms.uGyroIntensity.value = 0.0;
                }
            }
            
            material.uniforms.uRipples.value = rippleData;
            renderer.render(scene, camera);
        }

        // 徹底阻斷瀏覽器原生手勢
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        window.addEventListener('resize', resizeCanvas);
        animate();
    </script>
</body>
</html>
