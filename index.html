<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Haunted Gilded Mirror - Vibe Coding</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #65067b; /* 統一魔幻紫背景 */
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 預留 93vh 安全邊距，防止雕花被手機路徑列裁切 */
        #mirror-wrapper {
            position: relative;
            height: 93vh;
            aspect-ratio: 1 / 2;
            background-color: #65067b;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        /* 頂層金框 */
        #mirror-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; 
            z-index: 10;
        }

        /* WebGL 畫布：精準與金框内軌完美咬合 */
        #webgl-canvas {
            position: absolute;
            top: 11.0%;
            left: 10.5%;
            width: 79.0%;
            height: 41.0%;
            border-radius: 50%;
            z-index: 5;
            background-color: #65067b;
            touch-action: none;
        }

        /* 互動初始遮罩 */
        #onboarding-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #65067b;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #65067b;
            background-color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        #status-tip {
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="onboarding-overlay">
        <button id="start-btn">Face the Mirror</button>
        <div id="status-tip">點擊以喚醒魔鏡並同步授權相機與陀螺儀</div>
    </div>
    
    <div id="mirror-wrapper">
        <img id="mirror-image" src="mirror.png" alt="Gilded Mirror Frame">
        <canvas id="webgl-canvas"></canvas>
    </div>

    <script>
        const overlay = document.getElementById('onboarding-overlay');
        const startBtn = document.getElementById('start-btn');
        const statusTip = document.getElementById('status-tip');
        const canvas = document.getElementById('webgl-canvas');
        
        // 1. 初始化 Three.js Scene
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            renderer.setSize(rect.width, rect.height, false);
            if (material) {
                material.uniforms.uCanvasAspect.value = rect.width / rect.height;
            }
        }

        // 2. 視訊設定
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;

        let videoAspect = 1.777; 
        video.addEventListener('loadedmetadata', () => {
            videoAspect = video.videoWidth / video.videoHeight;
            if (material) material.uniforms.uVideoAspect.value = videoAspect;
        });

        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        // 3. 滑鼠局部漣漪快取 (手機陀螺儀將統一使用此系統)
        const maxRipples = 6;
        const ripples = Array(maxRipples).fill(null).map(() => ({ x: 0, y: 0, age: 0, intensity: 0 }));
        const rippleData = new Float32Array(maxRipples * 4); 
        let rippleIndex = 0;
        let lastX = 0, lastY = 0;

        // 【核心修正】手機版虛擬游標與物理狀態暫存
        let virtualGyroCursor = { x: 0.5, y: 0.5 }; // 虛擬游標位置 (0~1)
        let lastVirtualCursorX = 0.5, lastVirtualCursorY = 0.5;
        let lastShakeTimeTrigger = 0; // 用於限制觸發頻率
        let lastAccX = 0, lastAccY = 0; // 用於計算靈敏度

        // 4. 流體美學著色器 (獨佔動態多中心演算法)
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uVideoTex: { value: videoTexture },
                uRipples: { value: rippleData },
                uCanvasAspect: { value: 1.0 },
                uVideoAspect: { value: 1.777 }
                // 【核心修正】彻底移除單次大波紋相關的舊 Uniforms (uGyroAge, uGyroIntensity, uGyroCenter)
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D uVideoTex;
                uniform vec4 uRipples[6]; 
                uniform float uCanvasAspect;
                uniform float uVideoAspect;
                varying vec2 vUv;

                void main() {
                    vec2 uv = vUv;
                    vec2 displacedUv = uv;
                    float shadowHighlight = 0.0;
                    
                    // 【核心修正】徹底移除舊的大水波 Shader 邏輯。

                    // 【統一系統：桌機版滑鼠微波 / 新手機版陀螺儀虛擬游標微波】
                    for(int i = 0; i < 6; i++) {
                        float age = uRipples[i].z;
                        if (age > 0.0 && age < 1.0) {
                            vec2 center = uRipples[i].xy;
                            vec2 uvScaled = uv * vec2(uCanvasAspect, 1.0);
                            vec2 centerScaled = center * vec2(uCanvasAspect, 1.0);
                            float dist = distance(uvScaled, centerScaled);
                            float maxRadius = age * 0.6;
                            
                            if (dist < maxRadius) {
                                float progress = dist / maxRadius;
                                float wave = sin((dist - maxRadius) * 35.0);
                                float intensity = uRipples[i].w * pow(1.0 - age, 1.5) * smoothstep(0.0, 0.2, progress);
                                
                                vec2 dir = uvScaled - centerScaled;
                                if (length(dir) > 0.0001) {
                                    // 【核心修正】微調亮暗反差（0.012 -> 0.015, 0.025 -> 0.035），提高整體靈敏度下的視覺清晰度
                                    displacedUv += (normalize(dir) / vec2(uCanvasAspect, 1.0)) * wave * intensity * 0.015;
                                    shadowHighlight += wave * intensity * 0.035;
                                }
                            }
                        }
                    }
                    
                    displacedUv = clamp(displacedUv, 0.002, 0.998);
                    displacedUv.x = 1.0 - displacedUv.x; // 鏡像修正
                    
                    // 著色器內置不變形 Object-Fit Cover 演算法
                    vec2 finalVideoUv = displacedUv;
                    if (uCanvasAspect > uVideoAspect) {
                        float ratio = uVideoAspect / uCanvasAspect;
                        finalVideoUv.y = (finalVideoUv.y - 0.5) * ratio + 0.5;
                    } else {
                        float ratio = uCanvasAspect / uVideoAspect;
                        finalVideoUv.x = (finalVideoUv.x - 0.5) * ratio + 0.5;
                    }
                    
                    vec4 texColor = texture2D(uVideoTex, finalVideoUv);
                    vec3 rgb = texColor.rgb + vec3(shadowHighlight);
                    gl_FragColor = vec4(rgb, 1.0);
                }
            `
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        function triggerMouseRipple(canvasX, canvasY, intensityMod = 1.0) {
            let x = canvasX / canvas.clientWidth;
            let y = 1.0 - (canvasY / canvas.clientHeight);

            const dist = Math.hypot(x - lastX, y - lastY);
            if (dist > 0.02 || intensityMod > 1.1) {
                ripples[rippleIndex] = { x, y, age: 0.01, intensity: intensityMod * 0.6 };
                rippleIndex = (rippleIndex + 1) % maxRipples;
                lastX = x;
                lastY = y;
            }
        }

        // --- 桌機滑鼠監聽（僅在 Canvas 內部） ---
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerMouseRipple(e.clientX - rect.left, e.clientY - rect.top, 1.0);
            }
        });

        window.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerMouseRipple(e.clientX - rect.left, e.clientY - rect.top, 1.5);
            }
        });

        // --- 授權流程與非同步綁定 ---
        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            statusTip.innerText = "正在請求相機權限...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
                });
                video.srcObject = stream;
                await video.play();

                statusTip.innerText = "正在激活陀螺儀...";
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') initGyroscope();
                } else {
                    initGyroscope();
                }

                overlay.style.opacity = 0;
                setTimeout(() => overlay.remove(), 500);
                resizeCanvas();

            } catch (err) {
                console.error(err);
                startBtn.style.display = 'block';
                statusTip.innerText = "授權失敗，請確保環境支援並允許鏡頭存取。";
            }
        });

        // --- 【核心修正】陀螺儀動態捕捉：數據像滑鼠游標一樣游移，觸發普通波紋 ---
        function initGyroscope() {
            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity;
                if (!acc) return;

                // 即時位移向量差
                const deltaX = acc.x - lastAccX;
                const deltaY = acc.y - lastAccY;
                const change = Math.abs(deltaX) + Math.abs(deltaY);
                
                lastAccX = acc.x;
                lastAccY = acc.y;

                const now = Date.now();
                
                // 【核心修正 A: 映射物理偏移】根據手機的傾斜向量（加速度），計算虛擬游標在鏡面中的座標偏移。
                // 閥值微調系數控制靈敏度。我們將 delta 映射到合理的 UV 空間 (0.15~0.85 區間)。
                let offsetX = THREE.MathUtils.clamp(acc.x * -0.045, -0.35, 0.35); // `-9.8` -> `0.44`左偏, `+9.8` -> `-0.44`右偏
                let offsetY = THREE.MathUtils.clamp(acc.y * -0.045, -0.35, 0.35); // 調整系數以控制映射範圍
                
                // 手機往右下偏移時，x = -deltaX * 系數, y = -deltaY * 系數。
                // 當手機往右下偏，起點在右下處。
                // Y 軸在 WebGL 是向上的。

                // 【核心修正 B: 模擬滑鼠移動】更新虛擬游標位置，並使用插值使其絲滑游移。
                // 當手機往右下偏，acc.x 減小，offsetX 增加。 acc.y 減小，offsetY 增加。這不對。

                // 用戶的描述提供了明確的修復方向：
                // [理想效果]：陀螺儀數據 (加速度/重力) -> 模擬滑鼠游標位置。
                // 當手機往右下偏，起點在右下處。這意味著偏移是正的。

                let mapAccToOffset = (val, maxAcc, maxOffset) => {
                    return THREE.MathUtils.clamp((val / maxAcc) * maxOffset, -maxOffset, maxOffset);
                };

                let curTargetOffsetX = mapAccToOffset(acc.x, 9.8, 0.38); // `-9.8` (g) -> `-0.38`, `+9.8` (g) -> `+0.38`
                let curTargetOffsetY = mapAccToOffset(acc.y + 9.8, 19.6, 0.38) - 0.19; // 手機垂直時向下偏 (`-9.8`->`-0.19`), 仰角向上 ( `+9.8`->`+0.19`)

                virtualGyroCursor.x = virtualGyroCursor.x * 0.82 + (0.5 + curTargetOffsetX) * 0.18; // 絲滑插值
                virtualGyroCursor.y = virtualGyroCursor.y * 0.82 + (0.5 + curTargetOffsetY) * 0.18;

                // 【核心修正 C: 超高靈敏度觸發 普通波紋】
                // 為了用戶說的「數據就像滑鼠游標」，我們使用移動距離來觸發普通波紋。不需要 `uGyroIntensity` 全局變量。
                const distMoved = Math.hypot(virtualGyroCursor.x - lastVirtualCursorX, virtualGyroCursor.y - lastVirtualCursorY);
                lastVirtualCursorX = virtualGyroCursor.x;
                lastVirtualCursorY = virtualGyroCursor.y;

                // 強度基於 `acc.x/y` 的變化率。
                // 如果移動距離夠大，就觸發一個普通的 ripple。強度可以基於移動速度。
                // 我們統一使用一個波紋系統，動態完美自然！

                if (distMoved > 0.012 && (now - lastShakeTimeTrigger > 50)) { // 增加一個冷卻時間
                    // 映射虛擬游標到 Canvas 座標 (觸發 `triggerMouseRipple`)
                    const rect = canvas.getBoundingClientRect();
                    const canvasX = virtualGyroCursor.x * rect.width;
                    const canvasY = (1.0 - virtualGyroCursor.y) * rect.height; // Y 軸翻轉

                    // 強度基於速度和累積變化。用戶要求靈敏，我應該確保強度足夠。
                    // 靈敏度系數：變化越大強度越高。
                    const intensity = 0.8 + change * 0.18;

                    triggerMouseRipple(canvasX, canvasY, intensity);
                    lastShakeTimeTrigger = now;
                }
            });
        }

        // 6. 核心排程循環
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            // 更新滑鼠 / 手機虛擬游標漣漪消逝速度 (加速至 1.45，清澈水速)
            for(let i = 0; i < maxRipples; i++) {
                if (ripples[i].age > 0) {
                    ripples[i].age += delta * 1.45; 
                    if (ripples[i].age >= 1.0) ripples[i].age = 0; 
                }
                rippleData[i*4 + 0] = ripples[i].x;
                rippleData[i*4 + 1] = ripples[i].y;
                rippleData[i*4 + 2] = ripples[i].age;
                rippleData[i*4 + 3] = ripples[i].intensity;
            }
            
            // 【核心修正】彻底移除舊的大水波更新邏輯。

            material.uniforms.uRipples.value = rippleData;
            renderer.render(scene, camera);
        }

        // 彻底阻斷瀏覽器原生手勢
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        window.addEventListener('resize', resizeCanvas);
        animate();
    </script>
</body>
</html>
