<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haunted Gilded Mirror - Vibe Coding</title>
    <style>
        /* 統一整個網頁的背景色為魔幻紫，並置中鏡子 */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #65067b;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        /* 建立一個嚴格符合鏡子 1:2 比例的容器 */
        #mirror-wrapper {
            position: relative;
            height: 100vh;
            aspect-ratio: 1 / 2;
            background-color: #65067b;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 鏡子框圖片：置頂層 */
        #mirror-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; /* 讓滑鼠點擊可以穿透到下層的 Canvas */
            z-index: 10;
        }

        /* WebGL Canvas：用百分比精準鎖死在鏡子的黑色鏤空處，並裁切成橢圓 */
        #webgl-canvas {
            position: absolute;
            top: 16.5%;
            left: 14.4%;
            width: 71.2%;
            height: 32.5%;
            border-radius: 50%;
            z-index: 5; /* 放在鏡框圖層之下（如果 mirror.png 中間是透明的，會完美契合） */
            background-color: #000;
        }

        #loading {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 100;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loading">請允許相機權限以啟動魔鏡...</div>
    
    <div id="mirror-wrapper">
        <img id="mirror-image" src="mirror.png" alt="Gilded Mirror Frame">
        <canvas id="webgl-canvas"></canvas>
    </div>

    <script>
        const loadingEl = document.getElementById('loading');
        const canvas = document.getElementById('webgl-canvas');
        
        // 1. 初始化 Three.js 場景與正交相機
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        
        // 根據 Canvas 的實際 CSS 尺寸來設定渲染解析度
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            renderer.setSize(rect.width, rect.height, false);
            if (material) {
                material.uniforms.uAspect.value = rect.width / rect.height;
            }
        }

        // 2. 獲取相機視訊串流
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;

        navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } } })
            .then(stream => {
                video.srcObject = stream;
                video.play();
                loadingEl.innerText = "點擊畫面任意處可同步連動手機陀螺儀 📱";
                setTimeout(() => { loadingEl.style.opacity = 0; }, 4000);
            })
            .catch(err => {
                console.error("無法開啟相機: ", err);
                loadingEl.innerText = "無法開啟相機，請檢查瀏覽器隱私設定。";
            });

        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        // 3. 水波紋資料結構
        const maxRipples = 12;
        const ripples = Array(maxRipples).fill(null).map(() => ({ x: 0, y: 0, age: 0, intensity: 0 }));
        const rippleData = new Float32Array(maxRipples * 4); 
        let rippleIndex = 0;
        let lastX = 0, lastY = 0;

        // 4. 強烈液態感、高反差 Fragment Shader
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uVideoTex: { value: videoTexture },
                uRipples: { value: rippleData },
                uAspect: { value: 1.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D uVideoTex;
                uniform vec4 uRipples[12]; // x, y, age, intensity
                uniform float uAspect;
                varying vec2 vUv;

                void main() {
                    vec2 uv = vUv;
                    vec2 displacedUv = uv;
                    displacedUv.x = 1.0 - displacedUv.x; // 鏡像修正，像照鏡子一樣直覺
                    
                    float shadowHighlight = 0.0;
                    
                    // 遍歷波紋計算扭曲與光影調變
                    for(int i = 0; i < 12; i++) {
                        float age = uRipples[i].z;
                        if (age > 0.0 && age < 1.0) {
                            vec2 center = uRipples[i].xy;
                            
                            vec2 uvScaled = uv * vec2(uAspect, 1.0);
                            vec2 centerScaled = center * vec2(uAspect, 1.0);
                            
                            float dist = distance(uvScaled, centerScaled);
                            float maxRadius = age * 0.7; // 波紋擴散極限
                            
                            if (dist < maxRadius) {
                                float progress = dist / maxRadius;
                                
                                // 複雜度加強：雙重正弦與餘弦波疊加，創造更細緻的液體漣漪
                                float wave = sin((dist - maxRadius) * 55.0) * cos((dist - maxRadius) * 25.0);
                                
                                // 強度衰減控制 (邊緣與中心淡出)
                                float intensity = uRipples[i].w * pow(1.0 - age, 1.5) * min(smoothstep(0.0, 0.15, progress), smoothstep(1.0, 0.7, progress));
                                
                                vec2 dir = uvScaled - centerScaled;
                                if (length(dir) > 0.0001) {
                                    // 增強扭曲幅度 (0.06)
                                    float distortion = wave * intensity * 0.06;
                                    displacedUv += (normalize(dir) / vec2(uAspect, 1.0)) * distortion;
                                    
                                    // 【核心修改】拉大明暗反差：根據波峰波谷計算即時的光影反射(Highlight & Shadow)
                                    shadowHighlight += wave * intensity * 0.5;
                                }
                            }
                        }
                    }
                    
                    displacedUv = clamp(displacedUv, 0.002, 0.998);
                    vec4 texColor = texture2D(uVideoTex, displacedUv);
                    
                    vec3 rgb = texColor.rgb;
                    
                    // 【核心修改】整體畫面基礎對比度再拉高
                    rgb = (rgb - 0.5) * 1.25 + 0.5;
                    
                    // 注入剛剛計算出來的波紋亮暗面反差
                    rgb += vec3(shadowHighlight);
                    
                    gl_FragColor = vec4(rgb, 1.0);
                }
            `
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // 5. 互動事件觸發邏輯
        function triggerRipple(canvasX, canvasY, isClick = false, isGyro = false) {
            let x = canvasX / canvas.clientWidth;
            let y = 1.0 - (canvasY / canvas.clientHeight);

            if (isGyro) {
                // 陀螺儀觸發時，波紋直接從鏡面正中央擴散
                x = 0.5;
                y = 0.5;
            }

            const dist = Math.hypot(x - lastX, y - lastY);
            if (dist > 0.02 || isClick || isGyro) {
                ripples[rippleIndex] = {
                    x,
                    y,
                    age: 0.01,
                    intensity: isGyro ? 1.8 : (isClick ? 1.6 : 1.1) // 增強整體波動能量
                };
                rippleIndex = (rippleIndex + 1) % maxRipples;
                if (!isGyro) {
                    lastX = x;
                    lastY = y;
                }
            }
        }

        // --- 桌機滑鼠監聽（僅在 Canvas 範圍內有效） ---
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerRipple(e.clientX - rect.left, e.clientY - rect.top, false);
            }
        });

        window.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerRipple(e.clientX - rect.left, e.clientY - rect.top, true);
            }
        });

        // --- 手機陀螺儀（晃動觸發）與權限請求 ---
        let gyroActivated = false;
        window.addEventListener('click', () => {
            if (gyroActivated) return;
            
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            initGyroscope();
                        }
                    }).catch(console.error);
            } else {
                initGyroscope(); // Android 或舊版 iOS 直接啟動
            }
            gyroActivated = true;
        });

        let lastShakeTime = 0;
        let lastAccX = 0, lastAccY = 0;

        function initGyroscope() {
            loadingEl.style.opacity = 1;
            loadingEl.innerText = "陀螺儀已連動！搖晃手機試試看 🔮";
            setTimeout(() => { loadingEl.style.opacity = 0; }, 2000);

            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity;
                if (!acc) return;

                // 計算動態晃動變量
                const change = Math.abs(acc.x - lastAccX) + Math.abs(acc.y - lastAccY);
                lastAccX = acc.x;
                lastAccY = acc.y;

                const now = Date.now();
                // 晃動過關且冷卻時間超過 300 毫秒，在中央炸開一道巨型漣漪
                if (change > 7.5 && (now - lastShakeTime > 300)) {
                    triggerRipple(0, 0, false, true);
                    lastShakeTime = now;
                }
            });
        }

        // 6. 動態渲染循環 (Render Loop)
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            for(let i = 0; i < maxRipples; i++) {
                if (ripples[i].age > 0) {
                    ripples[i].age += delta * 0.75; // 稍微加快擴散速度，感覺更靈動
                    if (ripples[i].age >= 1.0) ripples[i].age = 0; 
                }
                rippleData[i*4 + 0] = ripples[i].x;
                rippleData[i*4 + 1] = ripples[i].y;
                rippleData[i*4 + 2] = ripples[i].age;
                rippleData[i*4 + 3] = ripples[i].intensity;
            }
            
            material.uniforms.uRipples.value = rippleData;
            renderer.render(scene, camera);
        }
        
        // 初始與調整視窗大小
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animate();
    </script>
</body>
</html>
