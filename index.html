<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haunted Gilded Mirror - Vibe Coding</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #65067b; /* 用戶要求的背景色 */
            overflow: hidden;
        }
        #main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 鏡子圖層：全屏， object-fit: contain， z-index 最高 */
        #mirror-image {
            height: 100vh;
            width: auto;
            object-fit: contain;
            pointer-events: none; /* 滑鼠穿透到 Canvas */
            z-index: 10;
            position: absolute;
            top: 0;
        }
        /* Canvas 容器： z-index 較低，放在鏡子後面 */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            z-index: 5;
        }
        #webgl-canvas {
            pointer-events: auto; /* 我們會監聽 Canvas 的事件 */
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            font-size: 1.2rem;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 20;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loading">請允許相機權限...</div>
    <div id="main-container">
        <img id="mirror-image" src="image_0.png" alt="gilded mirror frame">
        <div id="canvas-container">
            <canvas id="webgl-canvas"></canvas>
        </div>
    </div>

    <script>
        const loadingEl = document.getElementById('loading');
        
        // --- Three.js 初始化 (滿版 Canvas) ---
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // --- 撈取 Webcam (鏡像模式) ---
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;

        navigator.mediaDevices.getUserMedia({ video: { width: {理想: 1280}, height: {理想: 720} } })
            .then(stream => {
                video.srcObject = stream;
                video.play();
                loadingEl.style.opacity = 0;
            })
            .catch(err => {
                console.error("無法開啟相機: ", err);
                loadingEl.innerText = "無法開啟相機，請檢查瀏覽器權限。";
            });

        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        // --- 水波紋資料結構 ---
        const maxRipples = 12;
        const ripples = Array(maxRipples).fill(null).map(() => ({ x: 0, y: 0, age: 0, intensity: 0 }));
        const rippleData = new Float32Array(maxRipples * 4); 
        let rippleIndex = 0;
        let lastX = 0, lastY = 0;

        // --- 加強效果的 Shader 材質 (遮罩定位、複雜度、反差) ---
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uVideoTex: { value: videoTexture },
                uRipples: { value: rippleData },
                uAspect: { value: window.innerWidth / window.innerHeight },
                // 鏡子黑色區域在原始 100vh 下的比例位置百分比 (從頂部開始)
                // 精確測量：y 從大約 13.2% 到 19.8% (黑色橢圓，半徑~0.064)。 x 中心大約在0.5，半徑~0.35。
                // 轉換為 Shader 的 UV 座標 (y=0 是底部):
                // 中心 y 大約在 1.0 - (0.132 + 0.198)/2 = 0.835
                // 半徑 y 大約在 0.064 / 2 * 100vh = ~3.2% 的 UVy。
                // 硬編碼定位：
                uCenterMask: { value: new THREE.Vector2(0.5, 0.835) }, // 橢圓形遮罩中心 (UVx, UVy)
                uMaskRadius: { value: new THREE.Vector2(0.35, 0.032) } // 橢圓形遮罩軸長 (UVx, UVy)
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D uVideoTex;
                uniform vec4 uRipples[12]; // x, y, age, intensity
                uniform float uAspect;
                varying vec2 vUv;

                uniform vec2 uCenterMask; // 橢圓形遮罩中心 (UVx, UVy)
                uniform vec2 uMaskRadius; // 橢圓形遮罩軸長 (UVx, UVy)

                void main() {
                    vec2 uv = vUv;
                    
                    // 1. 建立圓形/橢圓形遮罩，與鏡子黑色區域對齊
                    // 我們將在 Shader 內丟棄遮罩外的像素以節省效能
                    vec2 scaledUv = (uv - uCenterMask) / uMaskRadius;
                    float ellDist = length(scaledUv);

                    if (ellDist > 1.0) {
                        discard; // 丟棄外部像素 (使該區域透明)，讓下方的紫紅色 body 背景顯示出來
                    }

                    vec2 displacedUv = uv;
                    displacedUv.x = 1.0 - displacedUv.x; // 鏡像修正
                    
                    // 遍歷所有波紋，計算折射，加強複雜度和反差
                    for(int i = 0; i < 12; i++) {
                        float age = uRipples[i].z;
                        
                        if (age > 0.0 && age < 1.0) {
                            vec2 center = uRipples[i].xy;
                            
                            // 確保波紋是正圓形
                            vec2 uvScaled = uv * vec2(uAspect, 1.0);
                            vec2 centerScaled = center * vec2(uAspect, 1.0);
                            
                            float dist = distance(uvScaled, centerScaled);
                            float maxRadius = age * 0.8; 
                            
                            if (dist < maxRadius) {
                                float progress = dist / maxRadius;
                                
                                // 增加多層漣漪圈圈
                                float wave1 = sin((dist - maxRadius) * 45.0);
                                float wave2 = cos((dist - maxRadius) * 80.0) * 0.5; // 疊加一個更高頻的 cos 波
                                float wave = wave1 + wave2;

                                // 拉大反差：使用 pow() 並放大
                                // 原始：float intensity = uRipples[i].w * (1.0 - age) * pow(progress, 3.0);
                                float intensity = uRipples[i].w * pow( (1.0 - age) * pow(progress, 3.0), 1.5 ) * 2.5;
                                
                                vec2 dir = uvScaled - centerScaled;
                                if (length(dir) > 0.0001) {
                                    // 將扭曲量加回未縮放的 UV 上
                                    displacedUv += (normalize(dir) / vec2(uAspect, 1.0)) * wave * intensity * 0.035;
                                }
                            }
                        }
                    }
                    
                    // 防止 UV 超出邊界
                    displacedUv = clamp(displacedUv, 0.001, 0.999);
                    
                    // 採樣相機紋理
                    vec4 texColor = texture2D(uVideoTex, displacedUv);
                    
                    // 柔和地裁剪橢圓邊緣
                    float mask = smoothstep(1.0, 0.95, ellDist); // 用 ellDist 進行柔邊，效果更準確
                    gl_FragColor = vec4(texColor.rgb, texColor.a * mask); // 使用 mask 來控制透明度

                }
            `
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // 建立一個檢查橢圓內外的函數，用於互動
        function isInsideMirrorEllipse(mx, my) {
            const x = mx / window.innerWidth;
            const y = 1.0 - (my / window.innerHeight); // 從底部開始

            // 使用與 Shader 一致的參數
            const center = material.uniforms.uCenterMask.value;
            const radius = material.uniforms.uMaskRadius.value;

            // 橢圓距離公式： (x-cx)^2/a^2 + (y-cy)^2/b^2 <= 1
            const dx = (x - center.x) / radius.x;
            const dy = (y - center.y) / radius.y;
            return (dx * dx + dy * dy) <= 1.0;
        }

        function spawnRipple(mx, my, isClick = false, isGiro = false) {
            let x = mx / window.innerWidth;
            let y = 1.0 - (my / window.innerHeight);

            // 陀螺儀連動的波紋只在橢圓中心觸發，不受滑鼠限制
            if (isGiro) {
                const center = material.uniforms.uCenterMask.value;
                x = center.x;
                y = center.y;
            } else if (!isInsideMirrorEllipse(mx, my)) {
                // 如果是滑鼠互動，且不在橢圓內，則不觸發新波紋
                return;
            }
            
            const dist = Math.hypot(x - lastX, y - lastY);
            if (dist > 0.015 || isClick || isGiro) {
                ripples[rippleIndex] = {
                    x, 
                    y, 
                    age: 0.01, 
                    intensity: isGiro ? 1.5 : (isClick ? 1.5 : 1.0) 
                };
                rippleIndex = (rippleIndex + 1) % maxRipples;
                if (!isGiro) { // 陀螺儀波紋不需要紀錄上次位置
                    lastX = x;
                    lastY = y;
                }
            }
        }

        // --- 桌機滑鼠監聽 ---
        window.addEventListener('mousemove', (e) => spawnRipple(e.clientX, e.clientY));
        window.addEventListener('mousedown', (e) => spawnRipple(e.clientX, e.clientY, true));
        // 手機版手指互動已移除

        // --- 手機陀螺儀 (Gyroscope) 連動 ---
        // 需要使用者手勢來請求權限
        let giroAllowed = false;
        document.body.addEventListener('click', function requestGiroPermission() {
            if (giroAllowed) return;
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                .then(response => {
                    if (response == 'granted') {
                        giroAllowed = true;
                        loadingEl.innerText = "已連動陀螺儀，試著晃動手機...";
                        setTimeout(() => loadingEl.style.opacity = 0, 1500);
                        startGiroListener();
                    }
                })
                .catch(console.error)
            } else {
                // 不需要請求權限的舊瀏覽器或 Android
                giroAllowed = true;
                startGiroListener();
            }
            document.body.removeEventListener('click', requestGiroPermission);
        }, { once: true });

        let lastShakeTime = 0;
        function startGiroListener() {
            window.addEventListener('devicemotion', (e) => {
                if (!giroAllowed) return;
                
                // 獲取加速度和旋轉率
                const acc = e.accelerationIncludingGravity;
                if (!acc) return;

                // 計算簡單的“晃動強度”
                // 我們只關注 x, y 的變化， z 是重力方向。
                const intensity = Math.abs(acc.x - (acc.lastX || 0)) + Math.abs(acc.y - (acc.lastY || 0));
                
                acc.lastX = acc.x;
                acc.lastY = acc.y;

                const now = Date.now();
                // 如果強度大於閾值，且距離上次晃動有一段時間，則觸發中心波紋
                if (intensity > 5.0 && now - lastShakeTime > 350) { 
                    spawnRipple(0, 0, false, true); // (0,0) 位置對陀螺儀波紋沒意義
                    lastShakeTime = now;
                }
            });
        }


        // --- Render Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            for(let i = 0; i < maxRipples; i++) {
                if (ripples[i].age > 0) {
                    ripples[i].age += delta * 0.65; // 控制速度
                    if (ripples[i].age >= 1.0) {
                        ripples[i].age = 0; 
                    }
                }
                rippleData[i*4 + 0] = ripples[i].x;
                rippleData[i*4 + 1] = ripples[i].y;
                rippleData[i*4 + 2] = ripples[i].age;
                rippleData[i*4 + 3] = ripples[i].intensity;
            }
            
            material.uniforms.uRipples.value = rippleData;
            renderer.render(scene, camera);
        }
        
        animate();

        // --- RWD 縮放修正 ---
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.uAspect.value = window.innerWidth / window.innerHeight;
        });
    </script>
</body>
</html>
