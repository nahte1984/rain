<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пла́чущее🪞зе́ркало</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #65067b; /* 紫背景 */
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 預留 93vh 安全邊距，防止雕花被手機路徑列裁切 */
        #mirror-wrapper {
            position: relative;
            height: 93vh;
            aspect-ratio: 1 / 2;
            background-color: #65067b;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        /* 頂層金框 */
        #mirror-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; 
            z-index: 10;
        }

        /* WebGL 畫布：精準與金框内軌完美咬合 */
        #webgl-canvas {
            position: absolute;
            top: 11.0%;
            left: 10.5%;
            width: 79.0%;
            height: 41.0%;
            border-radius: 50%;
            z-index: 5;
            background-color: #65067b;
            touch-action: none;
        }

        /* 互動初始遮罩 */
        #onboarding-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #65067b;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #65067b;
            background-color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        #status-tip {
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="onboarding-overlay">
        <button id="start-btn">Пла́чущее зе́ркало</button>
        <div id="status-tip">𝔰𝔥𝔞𝔨𝔢 𝔱𝔥𝔢 𝔪𝔦𝔯𝔯𝔬𝔯</div>
    </div>
    
    <div id="mirror-wrapper">
        <img id="mirror-image" src="mirror.png" alt="Gilded Mirror Frame">
        <canvas id="webgl-canvas"></canvas>
    </div>

    <script>
        const overlay = document.getElementById('onboarding-overlay');
        const startBtn = document.getElementById('start-btn');
        const statusTip = document.getElementById('status-tip');
        const canvas = document.getElementById('webgl-canvas');
        
        // 1. 初始化 Three.js Scene
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            renderer.setSize(rect.width, rect.height, false);
            if (material) {
                material.uniforms.uCanvasAspect.value = rect.width / rect.height;
            }
        }

        // 2. 視訊設定
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;

        let videoAspect = 1.777; 
        video.addEventListener('loadedmetadata', () => {
            videoAspect = video.videoWidth / video.videoHeight;
            if (material) material.uniforms.uVideoAspect.value = videoAspect;
        });

        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        // 3. 統一流體矩陣（手機、滑鼠、背景自動漣漪共用）
        const maxRipples = 6;
        const ripples = Array(maxRipples).fill(null).map(() => ({ x: 0, y: 0, age: 0, intensity: 0 }));
        const rippleData = new Float32Array(maxRipples * 4); 
        let rippleIndex = 0;
        let lastX = 0, lastY = 0;

        // 手機版虛擬游標與狀態
        let virtualGyroCursor = { x: 0.5, y: 0.5 };
        let lastVirtualCursorX = 0.5, lastVirtualCursorY = 0.5;
        let lastShakeTimeTrigger = 0;
        let lastAccX = 0, lastAccY = 0;

        // 【核心修正】背景自動觸發流體系統
        let lastAutoRippleTime = 0;

        // 4. 連續流體動態著色器 (更大幅度、和諧餘波演算)
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uVideoTex: { value: videoTexture },
                uRipples: { value: rippleData },
                uCanvasAspect: { value: 1.0 },
                uVideoAspect: { value: 1.777 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D uVideoTex;
                uniform vec4 uRipples[6]; 
                uniform float uCanvasAspect;
                uniform float uVideoAspect;
                varying vec2 vUv;

                void main() {
                    vec2 uv = vUv;
                    vec2 displacedUv = uv;
                    float shadowHighlight = 0.0;
                    
                    // 【統一系統：手機虛擬游標 / 背景自動流動】
                    for(int i = 0; i < 6; i++) {
                        float age = uRipples[i].z;
                        if (age > 0.0 && age < 1.0) {
                            vec2 center = uRipples[i].xy;
                            vec2 uvScaled = uv * vec2(uCanvasAspect, 1.0);
                            vec2 centerScaled = center * vec2(uCanvasAspect, 1.0);
                            float dist = distance(uvScaled, centerScaled);
                            float maxRadius = age * 1.1; // 稍微擴大最大半徑，呈現慢速蔓延
                            
                            if (dist < maxRadius) {
                                float progress = dist / maxRadius;
                                float wave = sin((dist - maxRadius) * 35.0);
                                
                                // 自然的水體老化衰減，指數下降更沉穩
                                float intensity = uRipples[i].w * pow(1.0 - age, 1.8) * smoothstep(0.0, 0.2, progress);
                                
                                vec2 dir = uvScaled - centerScaled;
                                if (length(dir) > 0.0001) {
                                    // 【核心修正】幅度大幅增加（0.015 -> 0.055），呈现激盪的大幅度魔幻拉扯
                                    displacedUv += (normalize(dir) / vec2(uCanvasAspect, 1.0)) * wave * intensity * 0.1;
                                    // 【核心修正】縮小光影反差，呈現有機水質柔和感，避免死黑
                                    shadowHighlight += wave * intensity * 0.065;
                                }
                            }
                        }
                    }
                    
                    displacedUv = clamp(displacedUv, 0.002, 0.998);
                    displacedUv.x = 1.0 - displacedUv.x; // 鏡像
                    
                    // 內置不變形 Object-Fit Cover
                    vec2 finalVideoUv = displacedUv;
                    if (uCanvasAspect > uVideoAspect) {
                        float ratio = uVideoAspect / uCanvasAspect;
                        finalVideoUv.y = (finalVideoUv.y - 0.5) * ratio + 0.5;
                    } else {
                        float ratio = uCanvasAspect / uVideoAspect;
                        finalVideoUv.x = (finalVideoUv.x - 0.5) * ratio + 0.5;
                    }
                    
                    vec4 texColor = texture2D(uVideoTex, finalVideoUv);
                    vec3 rgb = texColor.rgb + vec3(shadowHighlight);
                    gl_FragColor = vec4(rgb, 1.0);
                }
            `
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        function triggerMouseRipple(canvasX, canvasY, intensityMod = 1.0) {
            let x = canvasX / canvas.clientWidth;
            let y = 1.0 - (canvasY / canvas.clientHeight);

            const dist = Math.hypot(x - lastX, y - lastY);
            if (dist > 0.02 || intensityMod > 1.1) {
                ripples[rippleIndex] = { x, y, age: 0.01, intensity: intensityMod * 0.6 };
                rippleIndex = (rippleIndex + 1) % maxRipples;
                lastX = x;
                lastY = y;
            }
        }

        // --- 滑鼠監聽 ---
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerMouseRipple(e.clientX - rect.left, e.clientY - rect.top, 1.0);
            }
        });

        window.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerMouseRipple(e.clientX - rect.left, e.clientY - rect.top, 1.5);
            }
        });

        // --- 授權流程 ---
        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            statusTip.innerText = "正在請求相機權限...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
                });
                video.srcObject = stream;
                await video.play();

                statusTip.innerText = "正在啟動陀螺儀...";
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') initGyroscope();
                } else {
                    initGyroscope();
                }

                overlay.style.opacity = 0;
                setTimeout(() => overlay.remove(), 500);
                resizeCanvas();

            } catch (err) {
                console.error(err);
                startBtn.style.display = 'block';
                statusTip.innerText = "授權失敗，請確保環境支援並允許鏡頭存取。";
            }
        });

        // --- 陀螺儀動態捕捉：數據像滑鼠游標一樣游移，觸發普通波紋 ---
        function initGyroscope() {
            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity;
                if (!acc) return;

                // 即時位移向量差
                const deltaX = acc.x - lastAccX;
                const deltaY = acc.y - lastAccY;
                const change = Math.abs(deltaX) + Math.abs(deltaY);
                
                lastAccX = acc.x;
                lastAccY = acc.y;

                const now = Date.now();
                
                // 映射物理偏移：根據手機的傾斜向量（加速度），絲滑地插值計算虛擬游標目標。
                targetCenterX = 0.5 - THREE.MathUtils.clamp(acc.x * 0.042, -0.38, 0.38);
                targetCenterY = 0.5 - THREE.MathUtils.clamp(acc.y * 0.042, -0.38, 0.38);

                virtualGyroCursor.x = virtualGyroCursor.x * 0.84 + targetCenterX * 0.16;
                virtualGyroCursor.y = virtualGyroCursor.y * 0.84 + targetCenterY * 0.16;

                // 超高靈敏度觸發 普通波紋（用游標滑動距離觸發）
                const distMoved = Math.hypot(virtualGyroCursor.x - lastVirtualCursorX, virtualGyroCursor.y - lastVirtualCursorY);
                lastVirtualCursorX = virtualGyroCursor.x;
                lastVirtualCursorY = virtualGyroCursor.y;

                if (distMoved > 0.008 && (now - lastShakeTimeTrigger > 50)) { 
                    const rect = canvas.getBoundingClientRect();
                    const canvasX = virtualGyroCursor.x * rect.width;
                    const canvasY = (1.0 - virtualGyroCursor.y) * rect.height; // Y 軸翻轉

                    const intensity = 0.9 + change * 0.15; // 映射晃動變化率到波紋強度
                    triggerMouseRipple(canvasX, canvasY, intensity);
                    lastShakeTimeTrigger = now;
                }
            });
        }

        // 6. 核心排程循環 (物理模擬循環)
        const clock = new THREE.Clock();
        let targetCenterX = 0.5, targetCenterY = 0.5; // 手機游標插值目標

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const now = clock.getElapsedTime() * 1000; // 使用 clocks 的時間，防止瀏覽器切換標籤導致計時器異常
            
            // 【核心修正】更新滑鼠 / 手機虛擬游標 /背景自動漣漪消逝速度 (從 1.45 大幅下修至 0.65，使水波更優雅悠長)
            for(let i = 0; i < maxRipples; i++) {
                if (ripples[i].age > 0) {
                    ripples[i].age += delta * 1.1; // 調慢老化速度，呈現沉穩體感
                    if (ripples[i].age >= 1.0) ripples[i].age = 0; 
                }
                rippleData[i*4 + 0] = ripples[i].x;
                rippleData[i*4 + 1] = ripples[i].y;
                rippleData[i*4 + 2] = ripples[i].age;
                rippleData[i*4 + 3] = ripples[i].intensity;
            }
            
            // 【核心修正】和諧背景自動波紋有機觸發器
            // 使用 clock 的時間，約 1.2 至 2.0 秒隨機自動泛起一個微弱波紋
            if (now - lastAutoRippleTime > (1200 + Math.random() * 800)) {
                // 選取鏡面範圍內的隨機座標 (0.3 ~ 0.7 橢圓區間內)
                const randX = THREE.MathUtils.randFloat(0.35, 0.65);
                const randY = THREE.MathUtils.randFloat(0.35, 0.65);
                
                // 強度極淡（0.3），受到新的緩慢速度與大幅度設定影響，自然泛起悠長餘韻
                ripples[rippleIndex] = { x: randX, y: randY, age: 0.01, intensity: 0.3 };
                rippleIndex = (rippleIndex + 1) % maxRipples;
                lastAutoRippleTime = now;
            }

            material.uniforms.uRipples.value = rippleData;
            renderer.render(scene, camera);
        }

        // 阻斷瀏覽器原生手勢
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        window.addEventListener('resize', resizeCanvas);
        animate();
    </script>
</body>
</html>
