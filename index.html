<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Haunted Gilded Mirror - Vibe Coding</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #65067b; /* 統一魔幻紫大背景 */
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 1:2 鏡子黃金比例容器 */
        #mirror-wrapper {
            position: relative;
            height: 100vh;
            aspect-ratio: 1 / 2;
            background-color: #65067b;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        /* 頂層金色雕花框 */
        #mirror-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; 
            z-index: 10;
        }

        /* WebGL 畫布：【全面擴大】精準向外推展邊界，確保完美塞入內軌，絕不露白露黑 */
        #webgl-canvas {
            position: absolute;
            top: 11.0%;
            left: 10.5%;
            width: 79.0%;
            height: 41.0%;
            border-radius: 50%;
            z-index: 5; /* 隱入金框下方 */
            background-color: #65067b;
            touch-action: none;
        }

        /* 互動啟動遮罩 */
        #onboarding-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #65067b;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #65067b;
            background-color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        #status-tip {
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="onboarding-overlay">
        <button id="start-btn">Face the Mirror</button>
        <div id="status-tip">點擊以喚醒魔鏡並同步授權相機與陀螺儀</div>
    </div>
    
    <div id="mirror-wrapper">
        <img id="mirror-image" src="mirror.png" alt="Gilded Mirror Frame">
        <canvas id="webgl-canvas"></canvas>
    </div>

    <script>
        const overlay = document.getElementById('onboarding-overlay');
        const startBtn = document.getElementById('start-btn');
        const statusTip = document.getElementById('status-tip');
        const canvas = document.getElementById('webgl-canvas');
        
        // 1. 初始化 Three.js 場景
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            renderer.setSize(rect.width, rect.height, false);
            if (material) {
                material.uniforms.uCanvasAspect.value = rect.width / rect.height;
            }
        }

        // 2. 視訊設定與非失真比例檢測
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;

        let videoAspect = 1.777; 
        video.addEventListener('loadedmetadata', () => {
            videoAspect = video.videoWidth / video.videoHeight;
            if (material) material.uniforms.uVideoAspect.value = videoAspect;
        });

        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        // 3. 滑鼠微小波紋資料結構 (精簡至 6 個，維持輕量互動)
        const maxRipples = 6;
        const ripples = Array(maxRipples).fill(null).map(() => ({ x: 0, y: 0, age: 0, intensity: 0 }));
        const rippleData = new Float32Array(maxRipples * 4); 
        let rippleIndex = 0;
        let lastX = 0, lastY = 0;

        // 4. 全新流體力學著色器 (獨佔大巨浪 + 餘波演算)
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uVideoTex: { value: videoTexture },
                uRipples: { value: rippleData },
                uCanvasAspect: { value: 1.0 },
                uVideoAspect: { value: 1.777 },
                // 專門留給手機晃動大水波的全局控制
                uGyroAge: { value: 0.0 },
                uGyroIntensity: { value: 0.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D uVideoTex;
                uniform vec4 uRipples[6]; 
                uniform float uCanvasAspect;
                uniform float uVideoAspect;
                uniform float uGyroAge;
                uniform float uGyroIntensity;
                varying vec2 vUv;

                void main() {
                    vec2 uv = vUv;
                    vec2 displacedUv = uv;
                    float shadowHighlight = 0.0;
                    
                    // 【A. 手機晃動：全鏡面獨佔巨浪與餘波模擬】
                    if (uGyroAge > 0.0 && uGyroAge < 1.0) {
                        vec2 center = vec2(0.5, 0.5); // 從鏡面正中央炸開
                        vec2 uvScaled = uv * vec2(uCanvasAspect, 1.0);
                        vec2 centerScaled = center * vec2(uCanvasAspect, 1.0);
                        float dist = distance(uvScaled, centerScaled);
                        
                        // 使用多重干涉正弦與餘弦，調配出覆蓋全場的大浪與細密餘波 (Residual Waves)
                        float mainWave = sin(dist * 14.0 - uGyroAge * 28.0);
                        float harmonicWave = cos(dist * 26.0 - uGyroAge * 14.0) * 0.4;
                        float totalWave = mainWave + harmonicWave;
                        
                        // 優雅、自然的能量衰減曲線 (Time-based Exponential Decay)
                        float decay = pow(1.0 - uGyroAge, 1.8);
                        float waveIntensity = uGyroIntensity * decay;
                        
                        vec2 dir = uvScaled - centerScaled;
                        if (length(dir) > 0.0001) {
                            // 柔和的波紋拉扯，不產生硬刺
                            displacedUv += (normalize(dir) / vec2(uCanvasAspect, 1.0)) * totalWave * waveIntensity * 0.025;
                            // 縮小反差：平滑微弱的明暗變調，極致自然
                            shadowHighlight += totalWave * waveIntensity * 0.06;
                        }
                    }
                    
                    // 【B. 桌機版滑鼠局部微波】
                    for(int i = 0; i < 6; i++) {
                        float age = uRipples[i].z;
                        if (age > 0.0 && age < 1.0) {
                            vec2 center = uRipples[i].xy;
                            vec2 uvScaled = uv * vec2(uCanvasAspect, 1.0);
                            vec2 centerScaled = center * vec2(uCanvasAspect, 1.0);
                            float dist = distance(uvScaled, centerScaled);
                            float maxRadius = age * 0.6;
                            
                            if (dist < maxRadius) {
                                float progress = dist / maxRadius;
                                float wave = sin((dist - maxRadius) * 35.0);
                                float intensity = uRipples[i].w * pow(1.0 - age, 1.5) * smoothstep(0.0, 0.2, progress);
                                
                                vec2 dir = uvScaled - centerScaled;
                                if (length(dir) > 0.0001) {
                                    displacedUv += (normalize(dir) / vec2(uCanvasAspect, 1.0)) * wave * intensity * 0.012;
                                    shadowHighlight += wave * intensity * 0.03;
                                }
                            }
                        }
                    }
                    
                    displacedUv = clamp(displacedUv, 0.002, 0.998);
                    displacedUv.x = 1.0 - displacedUv.x; // 鏡像修正
                    
                    // 內置不變形 Object-Fit Cover 演算法
                    vec2 finalVideoUv = displacedUv;
                    if (uCanvasAspect > uVideoAspect) {
                        float ratio = uVideoAspect / uCanvasAspect;
                        finalVideoUv.y = (finalVideoUv.y - 0.5) * ratio + 0.5;
                    } else {
                        float ratio = uCanvasAspect / uVideoAspect;
                        finalVideoUv.x = (finalVideoUv.x - 0.5) * ratio + 0.5;
                    }
                    
                    vec4 texColor = texture2D(uVideoTex, finalVideoUv);
                    
                    // 柔和疊加光影調變
                    vec3 rgb = texColor.rgb + vec3(shadowHighlight);
                    gl_FragColor = vec4(rgb, 1.0);
                }
            `
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // 5. 互動觸發器
        function triggerMouseRipple(canvasX, canvasY, intensityMod = 1.0) {
            let x = canvasX / canvas.clientWidth;
            let y = 1.0 - (canvasY / canvas.clientHeight);

            const dist = Math.hypot(x - lastX, y - lastY);
            if (dist > 0.02 || intensityMod > 1.1) {
                ripples[rippleIndex] = { x, y, age: 0.01, intensity: intensityMod * 0.6 };
                rippleIndex = (rippleIndex + 1) % maxRipples;
                lastX = x;
                lastY = y;
            }
        }

        // --- 滑鼠監聽事件 ---
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerMouseRipple(e.clientX - rect.left, e.clientY - rect.top, 1.0);
            }
        });

        window.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerMouseRipple(e.clientX - rect.left, e.clientY - rect.top, 1.5);
            }
        });

        // --- 授權序向流處理 ---
        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            statusTip.innerText = "正在請求相機權限...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
                });
                video.srcObject = stream;
                await video.play();

                statusTip.innerText = "正在激活陀螺儀...";
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') initGyroscope();
                } else {
                    initGyroscope();
                }

                overlay.style.opacity = 0;
                setTimeout(() => overlay.remove(), 500);
                resizeCanvas();

            } catch (err) {
                console.error(err);
                startBtn.style.display = 'block';
                statusTip.innerText = "授權失敗，請確保環境支援並允許鏡頭存取。";
            }
        });

        // --- 陀螺儀動態捕捉：引發全局大波浪 ---
        let lastShakeTime = 0;
        let lastAccX = 0, lastAccY = 0;

        function initGyroscope() {
            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity;
                if (!acc) return;

                const change = Math.abs(acc.x - lastAccX) + Math.abs(acc.y - lastAccY);
                lastAccX = acc.x;
                lastAccY = acc.y;

                const now = Date.now();
                // 偵測到手機晃動，直接重置全局大水波
                if (change > 6.0 && (now - lastShakeTime > 400)) {
                    material.uniforms.uGyroAge.value = 0.01; // 重啟巨浪
                    material.uniforms.uGyroIntensity.value = 1.3; // 賦予充沛波動能量
                    lastShakeTime = now;
                }
            });
        }

        // 6. 核心排程循環 (Render Loop)
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            // A. 更新滑鼠局部漣漪 (正常自然速度)
            for(let i = 0; i < maxRipples; i++) {
                if (ripples[i].age > 0) {
                    ripples[i].age += delta * 0.75; // 正常水速
                    if (ripples[i].age >= 1.0) ripples[i].age = 0; 
                }
                rippleData[i*4 + 0] = ripples[i].x;
                rippleData[i*4 + 1] = ripples[i].y;
                rippleData[i*4 + 2] = ripples[i].age;
                rippleData[i*4 + 3] = ripples[i].intensity;
            }
            
            // B. 更新手機搖晃全局巨浪 (【核心修正】調配到最自然的消逝時間)
            if (material.uniforms.uGyroAge.value > 0.0) {
                material.uniforms.uGyroAge.value += delta * 0.65; // 調高速度係數，使其自然優雅地收尾
                if (material.uniforms.uGyroAge.value >= 1.0) {
                    material.uniforms.uGyroAge.value = 0.0;
                    material.uniforms.uGyroIntensity.value = 0.0;
                }
            }
            
            material.uniforms.uRipples.value = rippleData;
            renderer.render(scene, camera);
        }

        // 徹底阻斷 iOS 原生雙擊與縮放手勢
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        window.addEventListener('resize', resizeCanvas);
        animate();
    </script>
</body>
</html>
