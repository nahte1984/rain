<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Haunted Gilded Mirror - Vibe Coding</title>
    <style>
        /* 全局魔幻紫，完全封鎖手勢與連擊放大 */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #65067b;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 鏡子 1:2 完美容器 */
        #mirror-wrapper {
            position: relative;
            height: 100vh;
            aspect-ratio: 1 / 2;
            background-color: #65067b;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        /* 頂層金框 */
        #mirror-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; 
            z-index: 10;
        }

        /* WebGL 畫布：精準微調定位，使其完美滑入鏡面圈圈 */
        #webgl-canvas {
            position: absolute;
            top: 14.0%;
            left: 13.0%;
            width: 74.0%;
            height: 35.5%;
            border-radius: 50%;
            z-index: 5;
            background-color: #65067b;
            touch-action: none;
        }

        /* 「Face the Mirror」互動初始遮罩 */
        #onboarding-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #65067b;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease;
        }

        #start-btn {
            padding: 16px 36px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #65067b;
            background-color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
        }

        #start-btn:active {
            transform: scale(0.95);
            background-color: #e0e0e0;
        }

        #status-tip {
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-align: center;
            padding: 0 20px;
            line-height: 1.5;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="onboarding-overlay">
        <button id="start-btn">Face the Mirror</button>
        <div id="status-tip">點擊以喚醒魔鏡並同步相機與陀螺儀權限</div>
    </div>
    
    <div id="mirror-wrapper">
        <img id="mirror-image" src="mirror.png" alt="Gilded Mirror Frame">
        <canvas id="webgl-canvas"></canvas>
    </div>

    <script>
        const overlay = document.getElementById('onboarding-overlay');
        const startBtn = document.getElementById('start-btn');
        const statusTip = document.getElementById('status-tip');
        const canvas = document.getElementById('webgl-canvas');
        
        // 1. 初始化 Three.js
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            renderer.setSize(rect.width, rect.height, false);
            if (material) {
                material.uniforms.uCanvasAspect.value = rect.width / rect.height;
            }
        }

        // 2. 視訊設定與長寬比偵測
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;

        let videoAspect = 1.777; // 預設 16:9 比例
        video.addEventListener('loadedmetadata', () => {
            videoAspect = video.videoWidth / video.videoHeight;
            if (material) {
                material.uniforms.uVideoAspect.value = videoAspect;
            }
        });

        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        // 3. 擴張水波紋快取矩陣至 50 個，防止新產生的波紋覆蓋舊波紋
        const maxRipples = 50;
        const ripples = Array(maxRipples).fill(null).map(() => ({ x: 0, y: 0, age: 0, intensity: 0 }));
        const rippleData = new Float32Array(maxRipples * 4); 
        let rippleIndex = 0;
        let lastX = 0, lastY = 0;

        // 4. 客製化 Shader 材質 (修正壓扁、縮小扭曲、縮小反差)
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uVideoTex: { value: videoTexture },
                uRipples: { value: rippleData },
                uCanvasAspect: { value: 1.0 },
                uVideoAspect: { value: 1.777 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D uVideoTex;
                uniform vec4 uRipples[50]; // 支援 50 個獨立水波
                uniform float uCanvasAspect;
                uniform float uVideoAspect;
                varying vec2 vUv;

                void main() {
                    vec2 uv = vUv;
                    vec2 displacedUv = uv;
                    
                    float shadowHighlight = 0.0;
                    
                    // 計算 50 個波紋的物理疊加
                    for(int i = 0; i < 50; i++) {
                        float age = uRipples[i].z;
                        if (age > 0.0 && age < 1.0) {
                            vec2 center = uRipples[i].xy;
                            
                            vec2 uvScaled = uv * vec2(uCanvasAspect, 1.0);
                            vec2 centerScaled = center * vec2(uCanvasAspect, 1.0);
                            
                            float dist = distance(uvScaled, centerScaled);
                            float maxRadius = age * 0.6; // 優雅的擴散半徑
                            
                            if (dist < maxRadius) {
                                float progress = dist / maxRadius;
                                
                                // 溫和細緻的有機水波紋公式
                                float wave = sin((dist - maxRadius) * 40.0) * cos((dist - maxRadius) * 15.0);
                                
                                // 平滑的邊緣淡入淡出衰減
                                float intensity = uRipples[i].w * pow(1.0 - age, 2.0) * min(smoothstep(0.0, 0.2, progress), smoothstep(1.0, 0.7, progress));
                                
                                vec2 dir = uvScaled - centerScaled;
                                if (length(dir) > 0.0001) {
                                    // 【核心修正】降低扭曲幅度（降至 0.015），呈現優雅的水質柔和感
                                    float distortion = wave * intensity * 0.015;
                                    displacedUv += (normalize(dir) / vec2(uCanvasAspect, 1.0)) * distortion;
                                    
                                    // 【核心修正】極大幅度縮小亮暗反差（降至 0.08），避免出現不自然的死黑陰影
                                    shadowHighlight += wave * intensity * 0.08;
                                }
                            }
                        }
                    }
                    
                    displacedUv = clamp(displacedUv, 0.002, 0.998);
                    
                    // 鏡像修正（讓照鏡子的體驗符合直覺）
                    displacedUv.x = 1.0 - displacedUv.x;
                    
                    // 【核心修正】著色器內置 Object-Fit Cover 演算法，完美防止相機被壓扁
                    vec2 finalVideoUv = displacedUv;
                    if (uCanvasAspect > uVideoAspect) {
                        float ratio = uVideoAspect / uCanvasAspect;
                        finalVideoUv.y = (finalVideoUv.y - 0.5) * ratio + 0.5;
                    } else {
                        float ratio = uCanvasAspect / uVideoAspect;
                        finalVideoUv.x = (finalVideoUv.x - 0.5) * ratio + 0.5;
                    }
                    
                    vec4 texColor = texture2D(uVideoTex, finalVideoUv);
                    
                    // 混入極其自然的波紋微弱光影
                    vec3 rgb = texColor.rgb + vec3(shadowHighlight);
                    
                    gl_FragColor = vec4(rgb, 1.0);
                }
            `
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // 5. 波紋觸發與緩慢衰減邏輯
        function triggerRipple(canvasX, canvasY, intensityMod = 1.0, isGyro = false) {
            let x = canvasX / canvas.clientWidth;
            let y = 1.0 - (canvasY / canvas.clientHeight);

            if (isGyro) {
                x = 0.5;
                y = 0.5;
            }

            const dist = Math.hypot(x - lastX, y - lastY);
            // 降低觸發間距敏感度，配合高容量緩衝區，使波紋自然共存
            if (dist > 0.01 || intensityMod > 1.1 || isGyro) {
                ripples[rippleIndex] = {
                    x,
                    y,
                    age: 0.01,
                    intensity: (isGyro ? 1.4 : intensityMod) * 0.8
                };
                rippleIndex = (rippleIndex + 1) % maxRipples; // 輪替使用 50 個暫存槽
                if (!isGyro) {
                    lastX = x;
                    lastY = y;
                }
            }
        }

        // --- 滑鼠互動監聽（僅限 Canvas 內部） ---
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerRipple(e.clientX - rect.left, e.clientY - rect.top, 1.0);
            }
        });

        window.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                triggerRipple(e.clientX - rect.left, e.clientY - rect.top, 1.5);
            }
        });

        // 6. 依序異步授權流程（Face the Mirror 按鈕點擊）
        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            statusTip.innerText = "正在請求相機權限...";

            try {
                // 第一步：請求相機權限
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
                });
                video.srcObject = stream;
                await video.play();

                // 第二步：請求陀螺儀權限（針對 iOS 設備）
                statusTip.innerText = "正在請求陀螺儀感測權限...";
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') {
                        initGyroscope();
                    } else {
                        statusTip.innerText = "未授予陀螺儀權限，將僅啟用滑鼠互動。";
                    }
                } else {
                    // Android 或一般桌面瀏覽器
                    initGyroscope();
                }

                // 成功後隱藏遮罩層
                overlay.style.opacity = 0;
                setTimeout(() => overlay.style.removeProperty, 600);
                resizeCanvas();

            } catch (err) {
                console.error(err);
                startBtn.style.display = 'block';
                statusTip.innerText = "啟動失敗，請確保已允許相機存取權限。";
            }
        });

        // 陀螺儀動態偵測
        let lastShakeTime = 0;
        let lastAccX = 0, lastAccY = 0;

        function initGyroscope() {
            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity;
                if (!acc) return;

                const change = Math.abs(acc.x - lastAccX) + Math.abs(acc.y - lastAccY);
                lastAccX = acc.x;
                lastAccY = acc.y;

                const now = Date.now();
                // 溫和地觸發晃動波紋
                if (change > 6.5 && (now - lastShakeTime > 400)) {
                    triggerRipple(0, 0, 1.2, true);
                    lastShakeTime = now;
                }
            });
        }

        // 7. 渲染循環（Render Loop）
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            for(let i = 0; i < maxRipples; i++) {
                if (ripples[i].age > 0) {
                    // 【核心修正】大幅降低波紋的老化速度（改為 0.18），使水波更為緩慢、深沉且悠長
                    ripples[i].age += delta * 0.18; 
                    if (ripples[i].age >= 1.0) ripples[i].age = 0; 
                }
                rippleData[i*4 + 0] = ripples[i].x;
                rippleData[i*4 + 1] = ripples[i].y;
                rippleData[i*4 + 2] = ripples[i].age;
                rippleData[i*4 + 3] = ripples[i].intensity;
            }
            
            material.uniforms.uRipples.value = rippleData;
            renderer.render(scene, camera);
        }

        // 阻止 iOS 原生手勢放大
        document.addEventListener('gesturestart', (e) => e.preventDefault());

        window.addEventListener('resize', resizeCanvas);
        animate();
    </script>
</body>
</html>
